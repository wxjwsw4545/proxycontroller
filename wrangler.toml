# 告诉 Cloudflare 这是一个普通的 Worker
workers_dev = true

# 声明代码中用到的环境变量（用户在部署页面或稍后可以修改）
[vars]
WEB_USER = "admin"
WEB_PASS = "djxx@007329"
PROXY_USER = "wxjwsw"
PROXY_PASS = "7877874"

